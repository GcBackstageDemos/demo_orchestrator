apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: hello-world-template
  title: Hello World Service
  description: A simple template to test Backstage Software Templates functionality
  tags:
    - recommended
    - typescript
    - test
    - orchestrator
spec:
  owner: group:default/tssc
  type: service

  parameters:
    - title: Provide some simple information
      required:
        - orgName
        - repoName
        - serviceName
        - owner
      properties:
        orgName:
          title: Gitlab Organizatoin Name
          type: string
          description: Gitlab organizatoin name for the service
          ui:autofocus: true
          ui:options:
            rows: 1

        repoName:
          title: Gitlab Repository Name
          type: string
          description: A new Gitlab repository name for the service
          ui:options:
            rows: 1

        serviceName:
          title: Service Name
          type: string
          description: Unique name for the service
          ui:options:
            rows: 1
        owner:
          title: Owner
          type: string
          description: Owner of the service
          default: user:default/guest
          ui:options:
            rows: 1

  steps:
    - id: fetch-provision-data
      name: Fetch Provision Data
      action: catalog:fetch
      input:
        entityRef: component:default/provisioning-data

    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./skeleton
        values:
          orgName: ${{ parameters.orgName }}
          repoName: ${{ parameters.repoName }}
          serviceName: ${{ parameters.serviceName }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish
      action: publish:gitlab
      input:
        repoUrl: 'gitlab-gitlab.${{ steps["fetch-provision-data"].output.entity.metadata.labels["ocp-apps-domain"] }}?owner=${{ parameters.orgName }}&repo=${{ parameters.repoName }}'
        repoVisibility: public


    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}